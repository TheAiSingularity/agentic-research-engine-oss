risks:
  - id: R1
    title: "Recipe-CI flakiness from LLM API rate limits"
    severity: medium
    status: open
    impact: "Every recipe calls a real LLM. CI running on push could hit rate limits, producing flaky red builds."
    mitigation: "Gate recipe runs behind a cost-capped API key; consider a local quantized model fallback for CI; run recipe matrix on a nightly schedule rather than every push."
    created: 2026-04-19
    updated: 2026-04-19
  - id: R2
    title: "Trading recipe framing read as financial advice"
    severity: medium
    status: open
    impact: "Even framed as 'research + alerts', some readers may treat the recipe as a trading bot. Potential brand/legal issue."
    mitigation: "Prominent disclaimer in README, no broker integration, no order-placement code anywhere in the recipe, educational framing reinforced in comparison.md."
    created: 2026-04-19
    updated: 2026-04-19
  - id: R3
    title: "Pure-runnable format hits maintenance wall as recipes scale"
    severity: medium
    status: open
    impact: "Every recipe × framework × tier × language combination must stay green in CI. Combinatorial growth."
    mitigation: "core/ library absorbs shared logic. Rust variants only in categories where Rust wins. Production tier is opt-in, not mandatory."
    created: 2026-04-19
    updated: 2026-04-19
blockers: []
