description: "The best $0 local research agent. 8-node LangGraph pipeline (classify → plan → search → retrieve → fetch_url → compress → synthesize → verify) with 2026-SOTA composition (HyDE, CoVe, FLARE, step critic, cross-encoder rerank, contextual chunking, small-model hardening, streaming). Three interfaces (CLI + Textual TUI + FastAPI Web GUI). MCP server + Claude plugin bundle + plugin loader for Claude plugins and Hermes skills. Six domain presets. Runs fully local on Mac via Ollama + Gemma 3 4B + SearXNG + trafilatura, or any OpenAI-compatible endpoint via OPENAI_BASE_URL."
