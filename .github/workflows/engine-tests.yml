name: engine-tests

on:
  push:
    branches: [main]
    paths:
      - "engine/**"
      - "core/rag/**"
      - "recipes/**"
      - ".github/workflows/engine-tests.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "engine/**"
      - "core/rag/**"
      - "recipes/**"
      - ".github/workflows/engine-tests.yml"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install engine deps (lean set — only what the mocked tests need)
        run: |
          python -m pip install --upgrade pip
          # Engine core + test deps. Skip torch-heavy sentence-transformers
          # (only needed for live rerank). Skip mcp (tested behind skipif).
          pip install \
            "langgraph>=0.2.0" \
            "openai>=1.40.0" \
            "requests>=2.32.0" \
            "rank_bm25>=0.2.2" \
            "trafilatura>=1.12.0" \
            "pypdf>=4.0.0" \
            "textual>=0.80.0" \
            "rich>=13.7.0" \
            "fastapi>=0.115.0" \
            "uvicorn>=0.32.0" \
            "jinja2>=3.1.0" \
            "python-multipart>=0.0.9" \
            "mcp>=0.1.0" \
            "pytest>=8.0.0"

      - name: Run mocked test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test
        run: |
          python -m pytest \
            core/rag/tests \
            recipes/by-use-case/research-assistant \
            recipes/by-use-case/document-qa \
            engine/tests \
            -v --tb=short

      - name: Trading-copilot tests (separate venv, has yfinance)
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: test
        run: |
          pip install "yfinance>=0.2.0" "ta>=0.11.0" "pyyaml>=6.0" "feedparser>=6.0"
          python -m pytest recipes/by-use-case/trading-copilot -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "::notice::engine tests finished — see logs above for pass/fail summary"
